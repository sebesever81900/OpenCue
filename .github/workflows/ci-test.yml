name: CI Test
on: push
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libx11-dev protobuf-compiler libcurl4-openssl-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rust-install.sh
          bash ./rust-install.sh -y
      - name: Install dependencies
        run: |
          cd rust
          cargo build --release --verbose
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libx11-dev protobuf-compiler libcurl4-openssl-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rust-install.sh
          bash ./rust-install.sh -y
      - name: Run tests
        run: |
          cd rust
          cargo test --verbose
      - name: Run tests
        run: |
          cargo test -p rqd --no-run
      - name: Run tests
        run: |
          cargo test -p rqd
